<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SİBER KALKAN | Siber Tehdit Avcısı</title>
    
    <style>
        :root {
            --bg-dark: #050b14;
            --card-bg: #0b1220;
            --input-bg: #04070f;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --neon-blue: #38bdf8;
            --neon-green: #4ade80;
            --neon-red: #f87171;
            --neon-orange: #fb923c;
            --border-color: #1e293b;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }

        .main-card { 
            width: 100%; 
            max-width: 800px; 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 20px; 
            padding: 60px 40px; 
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .shield-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        .shield-inner {
            width: 52px;
            height: 52px;
            background: var(--card-bg);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shield-core {
            width: 35px;
            height: 35px;
            background: #38bdf8;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .search-container {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 6px 6px 6px 20px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .search-container:focus-within {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.15);
        }

        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 1.05rem;
            padding-right: 15px;
        }

        .search-container input::placeholder {
            color: #334155;
        }

        .search-container button {
            background: #38bdf8;
            color: #000000;
            border: none;
            padding: 14px 35px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .search-container button:hover {
            background: #7dd3fc;
        }

        /* Yükleniyor Alanı */
        .loader {
            display: none;
            margin-top: 30px;
        }
        .spinner {
            width: 35px;
            height: 35px;
            border: 3px solid rgba(56, 189, 248, 0.1);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        /* Sonuç Paneli */
        .result-panel {
            display: none;
            margin-top: 30px;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            animation: fadeIn 0.4s ease forwards;
        }
        .safe-box { background: rgba(74, 222, 128, 0.05); border: 1px solid rgba(74, 222, 128, 0.2); }
        .danger-box { background: rgba(248, 113, 113, 0.05); border: 1px solid rgba(248, 113, 113, 0.2); }
        
        .result-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 6px; }
        .result-desc { font-size: 0.9rem; color: #cbd5e1; line-height: 1.5; }

        /* Detay Raporu */
        .details-section {
            display: none;
            margin-top: 20px;
            text-align: left;
            animation: fadeIn 0.5s ease forwards;
        }
        .details-section h3 { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-item { background: rgba(255,255,255,0.01); border: 1px solid var(--border-color); padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .detail-text { font-size: 0.88rem; color: #94a3b8; }
        .detail-badge { font-size: 0.75rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; }

        /* Görseldeki Footer Bölümü */
        .footer-text {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #334155;
            text-align: center;
            line-height: 1.6;
        }
        .footer-text b {
            color: #475569;
        }

        @media (max-width: 600px) {
            .main-card { padding: 40px 20px; }
            h1 { font-size: 2rem; }
            .search-container { flex-direction: column; background: transparent; border: none; padding: 0; gap: 10px; }
            .search-container input { background: var(--input-bg); border: 1px solid var(--border-color); width: 100%; padding: 16px 20px; border-radius: 30px; }
            .search-container button { width: 100%; padding: 16px; }
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="shield-icon">
            <div class="shield-inner">
                <div class="shield-core"></div>
            </div>
        </div>

        <h1>SİBER KALKAN</h1>
        <div class="subtitle">Siber Tehdit Avcısı</div>

        <div class="search-container">
            <input type="text" id="target-url" placeholder="Taranacak web adresini girin...">
            <button onclick="siberAnalizEkle() ">ANALİZ ET</button>
        </div>

        <div class="loader" id="loading-zone">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); font-size: 0.8rem;" id="loading-text">Algoritmalar çalıştırılıyor...</p>
        </div>

        <div class="result-panel" id="result-zone">
            <div class="result-title" id="res-title"></div>
            <div class="result-desc" id="res-desc"></div>
        </div>

        <div class="details-section" id="details-zone">
            <h3>Katman Analiz Bulguları</h3>
            <div id="details-list"></div>
        </div>
    </div>

    <div class="footer-text">
        Toplumsal Siber Farkındalık Projesi • Verileriniz sunuculara gönderilmez, yerel olarak analiz edilir. • Geliştiren: <b>Zyntional.dev</b>
    </div>

    <script>
        async function siberAnalizEkle() {
            const urlInput = document.getElementById('target-url');
            const loader = document.getElementById('loading-zone');
            const loadingText = document.getElementById('loading-text');
            const resultZone = document.getElementById('result-zone');
            const detailsZone = document.getElementById('details-zone');
            const detailsList = document.getElementById('details-list');
            const resTitle = document.getElementById('res-title');
            const resDesc = document.getElementById('res-desc');

            if (!urlInput) return;
            let rawUrl = urlInput.value.trim().toLowerCase();

            if (!rawUrl) {
                alert("Lütfen bir analiz adresi girin kanka!");
                return;
            }

            // Reset paneller
            resultZone.style.display = "none";
            detailsZone.style.display = "none";
            loader.style.display = "block";
            detailsList.innerHTML = "";

            let temizUrl = rawUrl.replace(/^(https?:\/\/)?(www\.)?/, '');
            let domain = temizUrl.split('/')[0];

            let riskSkoru = 0;
            let bulgular = [];

            // Katman 1: Resmi Muafiyet Yapısı
            if (domain.endsWith('.gov.tr') || domain.endsWith('.edu.tr') || domain === 'ptt.com.tr' || domain === 'ptt.com') {
                setTimeout(() => {
                    loader.style.display = "none";
                    ekranaGuvenliBas(resultZone, detailsZone, detailsList, resTitle, resDesc, domain, "Güvenilir Resmi Altyapı");
                }, 500);
                return;
            }

            // Katman 2: Canlı Veritabanı Taraması
            loadingText.innerText = "Küresel siber istihbarat havuzu taranıyor...";
            const proxy = "https://corsproxy.io/?";
            const uzakListe = "https://raw.githubusercontent.com/mitchellkrogza/Phishing.Database/master/phishing-domains-ACTIVE.txt";
            
            try {
                const res = await fetch(`${proxy}${encodeURIComponent(uzakListe)}`);
                if (res.ok) {
                    const data = await res.text();
                    if (data.includes(domain)) {
                        riskSkoru += 60;
                        bulgular.push({ t: "Küresel Kara Liste Eşleşmesi", b: "ZARARLI", c: "var(--neon-red)" });
                    }
                }
            } catch(e) {
                console.log("Canlı istihbarat havuzuna erişilemedi, yerel kalkan devrede.");
            }

            // Katman 3: Yerel Zero-Day Algoritması (Sahte link kelime dedektörü)
            loadingText.innerText = "Hevristik sahte kelime analiz katmanı...";
            const tuzakKelimeler = ['ptt', 'kargo', 'icra', 'ceza', 'hediye', 'kazandiniz', 'banka', 'e-devlet', 'edevlet', 'login', 'giris', 'turktekno', 'onay'];
            let yakalananlar = tuzakKelimeler.filter(k => rawUrl.includes(k));

            if (yakalananlar.length > 0) {
                riskSkoru += 50;
                bulgular.push({ t: `Oltalama Anahtar Kelime İmzası (${yakalananlar.join(', ')})`, b: "ŞÜPHELİ", c: "var(--neon-orange)" });
            }

            const kotuUzantilar = ['.xyz', '.top', '.club', '.info', '.live', '.ru', '.tk'];
            if (kotuUzantilar.some(u => domain.endsWith(u))) {
                riskSkoru += 15;
                bulgular.push({ t: "Risk Faktörü Yüksek Uzantı Mimarisi", b: "UYARI", c: "var(--neon-orange)" });
            }

            // Analiz Bitiş ve Karar Ekranı
            setTimeout(() => {
                loader.style.display = "none";
                resultZone.style.display = "block";

                if (riskSkoru >= 50) {
                    resultZone.className = "result-panel danger-box";
                    resTitle.innerHTML = `<span style="color: var(--neon-red)">🚨 TEHLİKELİ SİTE / OLTALAMA DETEKTED</span>`;
                    resDesc.innerText = "Siber Kalkan analiz modülleri bu URL yapısında kimlik avı tuzağı veya zararlı yazılım izleri yakaladı. Kesinlikle veri girişi yapmayın.";
                    detailsZone.style.display = "block";
                } else {
                    resultZone.className = "result-panel safe-box";
                    resTitle.innerHTML = `<span style="color: var(--neon-green)">✅ BAĞLANTI GÜVENLİ GÖZÜKÜYOR</span>`;
                    resDesc.innerText = "Yapılan tarama ve sezgisel kontrollerde herhangi bir taklit marka girdisine veya aktif siber saldırı kaydına rastlanmadı.";
                }

                bulgular.forEach(b => {
                    detailsList.innerHTML += `
                        <div class="detail-item">
                            <span class="detail-text">${b.t}</span>
                            <span class="detail-badge" style="background: ${b.c}; color: #000;">${b.b}</span>
                        </div>`;
                });

            }, 600);
        }

        function ekranaGuvenliBas(resultZone, detailsZone, detailsList, resTitle, resDesc, domain, etiket) {
            resultZone.className = "result-panel safe-box";
            resultZone.style.display = "block";
            detailsZone.style.display = "block";
            resTitle.innerHTML = `<span style="color: var(--neon-green)">✅ DOĞRULANMIŞ GÜVENLİ ADRES</span>`;
            resDesc.innerText = `${domain} adresi beyaz listededir. Doğrulanmış kurumsal/resmi ağ geçididir.`;
            detailsList.innerHTML = `
                <div class="detail-item">
                    <span class="detail-text">Kurumsal Beyaz Liste Doğrulaması</span>
                    <span class="detail-badge" style="background: var(--neon-green); color: #000;">GÜVENLİ</span>
                </div>`;
        }
    </script>
</body>
</html>
