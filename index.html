<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Kalkan | Güvenlik ve Analiz</title>
    
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        :root {
            --primary: #1e3a8a; /* Siber Kalkan için daha koyu, güvenliği temsil eden lacivert */
            --bg: #0f172a;      /* Modern siber güvenlik projelerine uygun koyu arka plan */
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .container {
            background: white;
            width: 400px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* --- LOGO STİLİ --- */
        .app-logo {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: block;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 { color: #0f172a; font-size: 22px; margin-bottom: 5px; }
        .subtitle { color: #475569; font-size: 14px; margin-bottom: 20px; }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 10px;
            resize: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover { background: #1d4ed8; }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 10px;
            min-height: 50px;
            text-align: left;
            color: #0f172a;
            font-weight: 500;
            word-wrap: break-word;
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Siber Kalkan Logosu" class="app-logo">

    <h1>Siber Kalkan</h1>
    <p class="subtitle">Güvenlik ve Analiz Platformu</p>

    <textarea id="textInput" placeholder="Analiz edilecek veriyi veya metni buraya girin..."></textarea>
    
    <select id="langPair" style="width:100%; margin-bottom:10px; padding:8px; border-radius:5px; border: 1px solid #cbd5e1;">
        <option value="tr|en">Türkçe -> İngilizce</option>
        <option value="en|tr">İngilizce -> Türkçe</option>
    </select>

    <button class="btn" onclick="translateNow()">Şimdi Analiz Et</button>

    <div class="result" id="resultText">Sonuç burada görünecek...</div>

    <div style="margin-top: 25px; border-top: 1px solid #f1f5f9; padding-top: 20px; text-align: center;">
        <h3 style="color: #0f172a; font-size: 16px; margin-bottom: 10px;">🛡️ Hata Bildirimi / Tehdit İhbarı</h3>
        <p style="color: #475569; font-size: 13px; margin-bottom: 15px; line-height: 1.4;">Sistemde bulduğunuz açıkları, hataları veya geliştirme önerilerini aşağıdaki butona tıklayarak doğrudan bize bildirebilirsiniz.</p>
        
        <a href="mailto:zyntional.dev@gmail.com?subject=Siber Kalkan - Hata Bildirimi / Geri Bildirim" class="btn" style="text-decoration: none; display: inline-block; width: auto; padding: 10px 20px; background: #334155; font-size: 14px;">
            📧 Tehdit / Hata Bildir
        </a>
    </div>

    <footer>
        Hazırlayan: <b>R.Can ARMAN - 8/B</b>
    </footer>
</div>

<script>
    async function translateNow() {
        const text = document.getElementById('textInput').value.trim();
        const lang = document.getElementById('langPair').value.split('|');
        const resDiv = document.getElementById('resultText');

        if(!text) {
            alert("Lütfen analiz edilecek metni yazın!");
            return;
        }
        
        resDiv.innerText = "Analiz ediliyor...";

        try {
            const response = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${lang[0]}&tl=${lang[1]}&dt=t&q=${encodeURIComponent(text)}`);
            const data = await response.json();
            
            let translatedContent = "";
            if (data[0]) {
                data[0].forEach(item => {
                    if (item[0]) {
                        translatedContent += item[0];
                    }
                });
            }
            
            resDiv.innerText = translatedContent || "Sonuç bulunamadı.";
        } catch (error) {
            resDiv.innerText = "Hata! Lütfen ağ bağlantınızı kontrol edin.";
            console.error(error);
        }
    }
</script>

</body>
</html>
