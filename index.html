<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SİBER KALKAN | Siber Tehdit Avcısı</title>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #050716 0%, #0a0f2d 100%);
            --card-bg: rgba(11, 18, 48, 0.75);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-blue: #38bdf8;
            --neon-green: #4ade80;
            --neon-red: #f87171;
            --neon-orange: #fb923c;
            --border-color: rgba(56, 189, 248, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: '-apple-system', BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }

        .container { width: 100%; max-width: 750px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 45px 30px; backdrop-filter: blur(20px); box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5); margin-bottom: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        
        /* Orijinal Parıldayan Kalkan Logosu */
        .shield-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
            animation: pulse 2s infinite;
        }
        .shield-inner {
            width: 52px;
            height: 52px;
            background: #0b1220;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .shield-core {
            width: 35px;
            height: 35px;
            background: #38bdf8;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .header h1 { font-size: 2.4rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; letter-spacing: 0.5px; }
        .header p { color: var(--text-muted); font-size: 1rem; }

        .search-box { display: flex; background: rgba(4, 6, 18, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 16px; transition: all 0.3s ease; margin-bottom: 25px; gap: 8px; align-items: center; }
        .search-box:focus-within { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(56, 189, 248, 0.25); }
        .search-box input { flex: 1; background: transparent; border: none; outline: none; color: #fff; padding: 12px; font-size: 1rem; }
        .search-box button { background: var(--neon-blue); color: #060814; border: none; padding: 14px 28px; border-radius: 12px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .search-box button:hover { background: #7dd3fc; }

        .loader { display: none; text-align: center; margin: 25px 0; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(56, 189, 248, 0.1); border-top-color: var(--neon-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }

        .result-card { display: none; border-radius: 16px; padding: 22px; margin-bottom: 25px; animation: slideUp 0.4s ease forwards; }
        .safe-style { background: rgba(74, 222, 128, 0.06); border: 1px solid rgba(74, 222, 128, 0.3); }
        .danger-style { background: rgba(248, 113, 113, 0.06); border: 1px solid rgba(248, 113, 113, 0.3); }
        .result-header { display: flex; align-items: center; gap: 12px; font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }

        .report-section { display: none; background: rgba(4, 6, 18, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 20px; animation: slideUp 0.5s ease forwards; }
        .report-section h3 { font-size: 1.05rem; margin-bottom: 15px; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
        .report-list { display: flex; flex-direction: column; gap: 10px; }
        .report-item { padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .report-desc { font-size: 0.9rem; color: var(--text-muted); }
        .badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; font-weight: 700; }

        /* İstediğin Alt Bildirim Alanı */
        .footer-text { width: 100%; max-width: 750px; margin-top: 10px; font-size: 0.85rem; color: #334155; text-align: center; line-height: 1.6; }
        .footer-text b { color: #475569; }

        @media (max-width: 600px) {
            .container { padding: 25px 15px; }
            .search-box { flex-direction: column; background: transparent; border: none; padding: 0; }
            .search-box input { background: rgba(4, 6, 18, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 14px; width: 100%; margin-bottom: 8px; }
            .search-box button { width: 100%; padding: 14px; border-radius: 12px; }
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.04); opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="shield-icon">
                <div class="shield-inner">
                    <div class="shield-core"></div>
                </div>
            </div>
            <h1>SİBER KALKAN</h1>
            <p>Siber Tehdit Avcısı</p>
        </div>

        <div class="search-box">
            <input type="text" id="url-input" placeholder="Taranacak web adresini girin...">
            <button onclick="hibritSiberSorgu()">ANALİZ ET</button>
        </div>

        <div class="loader" id="loading-zone">
            <div class="spinner"></div>
            <p style="color: var(--neon-blue); font-size: 0.85rem;" id="loading-text">Algoritmalar çalıştırılıyor...</p>
        </div>

        <div class="result-card" id="status-card">
            <div class="result-header" id="status-title"></div>
            <p id="status-desc" style="font-size: 0.85rem; line-height: 1.5; color: #e2e8f0;"></p>
        </div>

        <div class="report-section" id="report-zone">
            <h3>Katman Analiz Bulguları</h3>
            <div class="report-list" id="report-list"></div>
        </div>
    </div>

    <div class="footer-text">
        Toplumsal Siber Farkındalık Projesi • Verileriniz sunuculara gönderilmez, yerel olarak analiz edilir. • Geliştiren: <b>Zyntional.dev</b>
    </div>

    <script>
        async function hibritSiberSorgu() {
            const inputElement = document.getElementById('url-input');
            const loader = document.getElementById('loading-zone');
            const loadingText = document.getElementById('loading-text');
            const statusCard = document.getElementById('status-card');
            const reportZone = document.getElementById('report-zone');
            const reportList = document.getElementById('report-list');
            const statusTitle = document.getElementById('status-title');
            const statusDesc = document.getElementById('status-desc');

            if (!inputElement) return;
            let urlInput = inputElement.value.trim().toLowerCase();

            if (!urlInput) {
                alert("Lütfen analiz için bir link girin kanka!");
                return;
            }

            statusCard.style.display = "none";
            reportZone.style.display = "none";
            loader.style.display = "block";
            reportList.innerHTML = "";

            let temizUrl = urlInput.replace(/^(https?:\/\/)?(www\.)?/, '');
            let domain = temizUrl.split('/')[0];

            let riskSkoru = 0;
            let bulgular = [];

            // Katman 1: Resmi Muafiyet Yapısı
            if (domain.endsWith('.gov.tr') || domain.endsWith('.edu.tr') || domain === 'ptt.com.tr' || domain === 'ptt.com') {
                setTimeout(() => {
                    loader.style.display = "none";
                    ekranaBasGuvenli(statusCard, reportZone, reportList, statusTitle, statusDesc, domain, "GÜVENLİ", "Güvenilir Resmi Altyapı");
                }, 500);
                return;
            }

            // Katman 2: Canlı Veritabanı Taraması
            loadingText.innerText = "Küresel siber istihbarat havuzu taranıyor...";
            const proxyUrl = "https://corsproxy.io/?";
            const blacklistUrl = "https://raw.githubusercontent.com/mitchellkrogza/Phishing.Database/master/phishing-domains-ACTIVE.txt";
            
            let listedeYakalndiMu = false;

            try {
                const response = await fetch(`${proxyUrl}${encodeURIComponent(blacklistUrl)}`);
                if (response.ok) {
                    const blackListData = await response.text();
                    if (blackListData.includes(domain)) {
                        listedeYakalndiMu = true;
                        riskSkoru += 60;
                        bulgular.push({ t: "Küresel Kara Liste Eşleşmesi", b: "ZARARLI", c: "var(--neon-red)" });
                    }
                }
            } catch (err) {
                console.log("Canlı listeye şu an erişilemedi, yerel zeka devrede.");
            }

            // Katman 3: Yerel Zero-Day Algoritması (Sahte link kelime dedektörü)
            loadingText.innerText = "Hevristik sahte kelime analiz katmanı...";
            const oltalamaKelimeleri = ['ptt', 'kargo', 'icra', 'ceza', 'hediye', 'kazandiniz', 'banka', 'e-devlet', 'edevlet', 'login', 'giris', 'turktekno', 'onay'];
            let yakalananKelimeler = oltalamaKelimeleri.filter(kelime => urlInput.includes(kelime));
            
            if (yakalananKelimeler.length > 0) {
                riskSkoru += 50; 
                bulgular.push({ t: `Oltalama Anahtar Kelime İmzası (${yakalananKelimeler.join(', ')})`, b: "ŞÜPHELİ", c: "var(--neon-orange)" });
            }

            const tehlikeliUzantilar = ['.xyz', '.top', '.club', '.info', '.live', '.ru', '.tk'];
            if (tehlikeliUzantilar.some(u => domain.endsWith(u))) {
                riskSkoru += 15;
                bulgular.push({ t: "Risk Faktörü Yüksek Uzantı Mimarisi", b: "UYARI", c: "var(--neon-orange)" });
            }

            // Karar ve Sonuç Ekranı
            setTimeout(() => {
                loader.style.display = "none";
                statusCard.style.display = "block";

                if (riskSkoru >= 50 || listedeYakalndiMu) {
                    statusCard.className = "result-card danger-style";
                    statusTitle.innerHTML = `<span style="color:var(--neon-red)">🚨 TEHLİKELİ SİTE / OLTALAMA DETEKTED</span>`;
                    statusDesc.innerText = "Siber Kalkan analiz modülleri bu URL yapısında kimlik avı tuzağı veya zararlı yazılım izleri yakaladı. Kesinlikle veri girişi yapmayın.";
                    reportZone.style.display = "block";
                } else {
                    statusCard.className = "result-card safe-style";
                    statusTitle.innerHTML = `<span style="color:var(--neon-green)">✅ BAĞLANTI GÜVENLİ GÖZÜKÜYOR</span>`;
                    statusDesc.innerText = "Yapılan tarama ve sezgisel kontrollerde herhangi bir taklit marka girdisine veya aktif siber saldırı kaydına rastlanmadı.";
                }

                bulgular.forEach(b => {
                    reportList.innerHTML += `
                        <div class="report-item">
                            <span class="report-desc">${b.t}</span>
                            <span class="badge" style="background:${b.c}; color:#000">${b.b}</span>
                        </div>`;
                });
            }, 600);
        }

        function ekranaBasGuvenli(statusCard, reportZone, reportList, statusTitle, statusDesc, domain, etiket, mesaj) {
            statusCard.style.display = "block";
            reportZone.style.display = "block";
            statusCard.className = "result-card safe-style";
            statusTitle.innerHTML = `<span style="color:var(--neon-green)">✅ DOĞRULANMIŞ GÜVENLİ ADRES</span>`;
            statusDesc.innerText = `${domain} adresi beyaz listededir. Doğrulanmış kurumsal/resmi ağ geçididir.`;
            reportList.innerHTML = `
                <div class="report-item">
                    <span class="report-desc">Kurumsal Beyaz Liste Doğrulaması</span>
                    <span class="badge" style="background:var(--neon-green); color:#000">${etiket}</span>
                </div>`;
        }
    </script>
</body>
</html>
